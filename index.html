<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PMI Audit · Toma de Datos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --surface2: #ede8dc;
    --border: #c0b49a;
    --accent: #0055cc;
    --accent2: #cc3300;
    --green: #007a3d;
    --yellow: #8a6000;
    --red: #cc0022;
    --orange: #b45309;
    --text: #1a1a1a;
    --muted: #6b5e4a;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .header-title { font-family: var(--sans); font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; flex: 1; }
  .header-title span { color: var(--text); }
  .clock { font-size: 13px; font-weight: 600; color: var(--accent); background: rgba(0,85,204,0.1); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(0,85,204,0.25); min-width: 55px; text-align: center; }

  .mode-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; gap: 8px; }
  .mode-btn { flex: 1; padding: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--sans); font-size: 12px; font-weight: 700; border-radius: 8px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; text-transform: uppercase; }
  .mode-btn.active-escalas { background: rgba(0,85,204,0.12); border-color: var(--accent); color: var(--accent); }
  .mode-btn.active-equipajes { background: rgba(204,51,0,0.1); border-color: var(--accent2); color: var(--accent2); }

  .upload-area { margin: 16px; border: 2px dashed var(--border); border-radius: 12px; padding: 32px 16px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); }
  .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: rgba(0,85,204,0.05); }
  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-title { font-family: var(--sans); font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .upload-sub { font-size: 11px; color: var(--muted); }
  #fileInput { display: none; }

  .filters { padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  .filter-row { display: flex; gap: 8px; align-items: center; }
  .filter-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; min-width: 50px; }
  .handler-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .chip { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; opacity: 0.45; font-family: var(--mono); }
  .chip.selected { opacity: 1; }
  .chip-DC4 { background: rgba(29,78,216,0.12); border-color: #1d4ed8; color: #1d4ed8; }
  .chip-DC4.selected { background: rgba(29,78,216,0.22); }
  .chip-DD8 { background: rgba(91,33,182,0.12); border-color: #5b21b6; color: #5b21b6; }
  .chip-DD8.selected { background: rgba(91,33,182,0.22); }
  .chip-EJU { background: rgba(146,64,14,0.12); border-color: #92400e; color: #92400e; }
  .chip-EJU.selected { background: rgba(146,64,14,0.22); }
  .chip-HU3 { background: rgba(6,95,70,0.12); border-color: #065f46; color: #065f46; }
  .chip-HU3.selected { background: rgba(6,95,70,0.22); }
  .chip-HS1 { background: rgba(157,23,77,0.12); border-color: #9d174d; color: #9d174d; }
  .chip-HS1.selected { background: rgba(157,23,77,0.22); }
  .chip-EXS { background: rgba(154,52,18,0.12); border-color: #9a3412; color: #9a3412; }
  .chip-EXS.selected { background: rgba(154,52,18,0.22); }
  .chip-RYR { background: rgba(153,27,27,0.12); border-color: #991b1b; color: #991b1b; }
  .chip-RYR.selected { background: rgba(153,27,27,0.22); }
  .chip-EWG { background: rgba(21,94,117,0.12); border-color: #155e75; color: #155e75; }
  .chip-EWG.selected { background: rgba(21,94,117,0.22); }

  .time-filter { display: flex; gap: 6px; flex: 1; }
  .time-input { flex: 1; padding: 6px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 13px; text-align: center; }
  .time-input:focus { outline: none; border-color: var(--accent); }

  .stats-bar { display: flex; gap: 8px; padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .stat { display: flex; flex-direction: column; align-items: center; min-width: 56px; padding: 6px 10px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
  .stat-num { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 9px; color: var(--muted); margin-top: 2px; text-transform: uppercase; }

  .flight-list { padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; }

  .flight-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; position: relative; overflow: hidden; transition: all 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .flight-card.next-flight { border-color: var(--accent); animation: pulse-border 2s ease-in-out infinite; }
  .flight-card.next-flight::before { content: 'PRÓXIMO'; position: absolute; top: 8px; right: 8px; font-size: 9px; font-weight: 700; color: var(--accent); background: rgba(0,85,204,0.12); padding: 2px 7px; border-radius: 4px; letter-spacing: 1px; }
  .flight-card.audited { opacity: 0.45; border-style: dashed; }
  .flight-card.audited::after { content: '✓ AUDITADO'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-size: 22px; font-weight: 800; color: var(--green); opacity: 0.25; pointer-events: none; font-family: var(--sans); }

  /* Remoto: borde naranja llamativo */
  .flight-card.remoto { border-left: 4px solid var(--orange); }
  .flight-card.remoto .card-top-bar { background: rgba(180,83,9,0.08); margin: -12px -12px 10px -12px; padding: 5px 12px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid rgba(180,83,9,0.2); border-radius: 10px 10px 0 0; }
  .remoto-badge { font-size: 10px; font-weight: 700; color: var(--orange); letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px; }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 2px rgba(0,85,204,0.15); }
    50% { box-shadow: 0 0 0 2px rgba(0,85,204,0.4), 0 0 20px rgba(0,85,204,0.15); }
  }

  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .flight-num { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: 1px; flex: 1; }
  .origin-tag { font-size: 12px; color: var(--muted); font-weight: 600; }

  /* 4 columnas en modo escalas para incluir puerta */
  .card-grid { display: grid; gap: 8px; margin-bottom: 10px; }
  .card-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .card-grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

  .card-field { display: flex; flex-direction: column; gap: 2px; }
  .field-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .field-value { font-size: 15px; font-weight: 700; color: var(--text); }
  .field-value.eta { color: var(--yellow); }
  .field-value.gate-val { color: var(--accent); }
  .field-value.puerta-val { color: var(--orange); font-size: 13px; }
  .field-value.cinta-val { color: var(--accent2); }
  .field-value.editable { border-bottom: 1px dashed var(--muted); cursor: pointer; padding-bottom: 1px; }
  .field-value.editable:hover { border-color: var(--accent); color: var(--accent); }

  .card-bottom { display: flex; gap: 8px; align-items: center; }
  .status-pill { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  .status-INBLOCK { background: rgba(0,122,61,0.15); color: var(--green); }
  .status-LANDED { background: rgba(0,122,61,0.08); color: #065f46; }
  .status-FINAL { background: rgba(138,96,0,0.15); color: var(--yellow); }
  .status-FIR { background: rgba(138,96,0,0.08); color: #92400e; }
  .status-FLYING { background: rgba(0,85,204,0.1); color: var(--accent); }
  .status-INITIAL, .status-SCHEDULED { background: rgba(107,94,74,0.15); color: var(--muted); }

  .audit-btn { padding: 6px 14px; border: none; border-radius: 6px; font-family: var(--mono); font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .audit-btn-do { background: rgba(0,122,61,0.15); color: var(--green); border: 1px solid rgba(0,122,61,0.35); }
  .audit-btn-do:hover { background: rgba(0,122,61,0.28); }
  .audit-btn-undo { background: rgba(107,94,74,0.15); color: var(--muted); border: 1px solid var(--border); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 24px 20px; width: 100%; max-width: 480px; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }
  .modal-title { font-family: var(--sans); font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 16px; }
  .modal-field { margin-bottom: 14px; }
  .modal-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .modal-input { width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 16px; font-weight: 600; }
  .modal-input:focus { outline: none; border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; }
  .modal-btn-save { background: var(--accent); color: #fff; }
  .modal-btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .no-data-msg { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

  .mat-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .mat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); min-width: 34px; }
  .mat-btn { flex: 1; padding: 8px 14px; background: rgba(0,85,204,0.08); border: 1px solid rgba(0,85,204,0.25); border-radius: 8px; color: var(--accent); font-family: var(--mono); font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 1.5px; text-align: center; transition: all 0.15s; }
  .mat-btn:active { background: rgba(0,85,204,0.18); transform: scale(0.97); }
  .mat-btn.copied { background: rgba(0,122,61,0.15); border-color: rgba(0,122,61,0.4); color: var(--green); }
  .mat-edit { padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 14px; cursor: pointer; transition: all 0.15s; }
  .mat-edit:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">PMI <span>AUDIT</span></div>
  <div class="clock" id="clock">--:--</div>
</div>

<div class="mode-bar">
  <button class="mode-btn active-escalas" id="btn-escalas" onclick="setMode('escalas')">✈ Escalas · Gates</button>
  <button class="mode-btn" id="btn-equipajes" onclick="setMode('equipajes')">🧳 Equipajes · Cintas</button>
</div>

<div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
  <div class="upload-icon">📂</div>
  <div class="upload-title">Cargar listado eSIA</div>
  <div class="upload-sub">Arrastra el .xls aquí o toca para seleccionar</div>
  <input type="file" id="fileInput" accept=".xls,.xlsx,.html,.htm" onchange="handleFile(event)">
</div>

<div class="filters" id="filtersSection" style="display:none">
  <div class="filter-row">
    <span class="filter-label">Handler</span>
    <div class="handler-chips" id="handlerChips"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Hora</span>
    <div class="time-filter">
      <input type="time" class="time-input" id="timeFrom" onchange="renderFlights()">
      <span style="color:var(--muted);align-self:center">—</span>
      <input type="time" class="time-input" id="timeTo" onchange="renderFlights()">
    </div>
  </div>
</div>

<div class="stats-bar" id="statsBar" style="display:none"></div>
<div class="flight-list" id="flightList"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Editar vuelo</div>
    <div class="modal-field">
      <div class="modal-label" id="modalFieldLabel">Gate / Stand</div>
      <input type="text" class="modal-input" id="modalInput">
    </div>
    <div class="modal-field">
      <div class="modal-label">Cinta</div>
      <input type="text" class="modal-input" id="modalInputCinta">
    </div>
    <div class="modal-field">
      <div class="modal-label">ETA</div>
      <input type="time" class="modal-input" id="modalInputEta">
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn modal-btn-save" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<script>
  let allFlights = [], audited = new Set(), edits = {}, selectedHandlers = new Set(), mode = 'escalas', editingId = null;
  const HANDLERS = ['DC4','DD8','EJU','HU3','HS1','EXS','RYR','EWG'];
  const HANDLER_NAMES = { DC4:'GroundForce', DD8:'S.Europe', EJU:'easyJet', HU3:'Menzies', HS1:'Swissport', EXS:'Jet2', RYR:'Azul', EWG:'Eurowings' };

  function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  }
  setInterval(updateClock, 1000); updateClock();

  function setMode(m) {
    mode = m;
    document.getElementById('btn-escalas').className = 'mode-btn' + (m==='escalas' ? ' active-escalas' : '');
    document.getElementById('btn-equipajes').className = 'mode-btn' + (m==='equipajes' ? ' active-equipajes' : '');
    renderFlights();
  }

  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); const f=e.dataTransfer.files[0]; if(f) processFile(f); });

  function handleFile(event) { const f=event.target.files[0]; if(f) processFile(f); }

  function processFile(file) {
    const reader = new FileReader();
    reader.onload = e => { try { parseESIA(e.target.result); } catch(err) { alert('Error: '+err.message); } };
    reader.readAsText(file, 'utf-8');
  }

  // Detecta si un stand es remoto:
  // - Número >= 100
  // - Tiene letra al final (34B, 06A, etc.)
  // - Empieza por letra (R-xx, etc.)
  function isRemoto(stand) {
    if (!stand || stand === '—') return false;
    const s = stand.toString().trim();
    if (/[A-Za-z]/.test(s)) return true;   // contiene letra → remoto
    const n = parseInt(s, 10);
    return !isNaN(n) && n >= 100;
  }

  function parseESIA(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    let dataTable = null;
    for (const t of doc.querySelectorAll('table')) {
      const headers = [...t.querySelectorAll('th')].map(th => th.textContent.trim());
      if (headers.includes('Id Llegadas')) { dataTable = t; break; }
    }
    if (!dataTable) { alert('No se encontró la tabla de vuelos.'); return; }
    const rows = [...dataTable.querySelectorAll('tr')];
    const headers = [...rows[0].querySelectorAll('th')].map(th => th.textContent.trim());
    const idx = n => headers.indexOf(n);

    const iVuelo = idx('Id Llegadas'), iOrig = idx('Orig.'), iSIBT = headers.lastIndexOf('SIBT'),
          iEta = idx('Eta'), iHRam = idx('HRam'), iMat = idx('Matricula'),
          iStand = idx('Stand'), iCinta = idx('Cinta'), iEstado = idx('Estado');

    // Puerta de embarque de salida — columna 'Puer.' en la parte de salidas
    // En el listado combinado aparece en la segunda mitad de la tabla
    // Buscamos el ÚLTIMO índice de 'Puer.' para coger el de salidas
    const iPuer = headers.lastIndexOf('Puer.');

    allFlights = [];
    for (let i=1; i<rows.length; i++) {
      const cells = [...rows[i].querySelectorAll('td')].map(td => td.textContent.trim().replace(/\s+/g,' '));
      if (cells.length < 10) continue;
      const vuelo = cells[iVuelo] || ''; if (!vuelo) continue;
      const hram = cells[iHRam] || ''; if (!HANDLERS.includes(hram)) continue;
      const stand = cells[iStand] || '—';
      const puer = iPuer >= 0 ? (cells[iPuer] || '—') : '—';
      allFlights.push({
        id: vuelo,
        origen: cells[iOrig] || '',
        hora: cells[iSIBT] || '',
        eta: cells[iEta] || '',
        handler: hram,
        matricula: cells[iMat] || '—',
        stand: stand,
        cinta: cells[iCinta] || '—',
        estado: cells[iEstado] || '',
        puerta: puer,
        remoto: isRemoto(stand)
      });
    }
    if (allFlights.length === 0) { alert('No se encontraron vuelos con handlers auditados.'); return; }
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('filtersSection').style.display = 'flex';
    document.getElementById('statsBar').style.display = 'flex';
    selectedHandlers = new Set(HANDLERS.filter(h => allFlights.some(f => f.handler === h)));
    buildHandlerChips(); setDefaultTimeRange(); renderFlights();
  }

  function setDefaultTimeRange() {
    const now = new Date(), to = new Date(now.getTime()+3*60*60*1000);
    const fmt = d => d.toTimeString().slice(0,5);
    document.getElementById('timeFrom').value = fmt(now);
    document.getElementById('timeTo').value = fmt(to);
  }

  function buildHandlerChips() {
    const container = document.getElementById('handlerChips'); container.innerHTML = '';
    HANDLERS.filter(h => allFlights.some(f => f.handler===h)).forEach(h => {
      const chip = document.createElement('button');
      chip.className = `chip chip-${h} ${selectedHandlers.has(h)?'selected':''}`;
      chip.textContent = h; chip.title = HANDLER_NAMES[h];
      chip.onclick = () => toggleHandler(h, chip);
      container.appendChild(chip);
    });
  }

  function toggleHandler(h, chip) {
    if (selectedHandlers.has(h)) { selectedHandlers.delete(h); chip.classList.remove('selected'); }
    else { selectedHandlers.add(h); chip.classList.add('selected'); }
    renderFlights();
  }

  function getFilteredFlights() {
    const from = document.getElementById('timeFrom').value, to = document.getElementById('timeTo').value;
    return allFlights.filter(f => {
      if (!selectedHandlers.has(f.handler)) return false;
      const eta = (edits[f.id]||{}).eta || f.eta || f.hora;
      if (from && to && eta && eta!=='—' && (eta<from || eta>to)) return false;
      return true;
    }).sort((a,b) => {
      const aA=audited.has(a.id)?1:0, bA=audited.has(b.id)?1:0;
      if (aA!==bA) return aA-bA;
      const etaA=(edits[a.id]||{}).eta||a.eta||a.hora||'99:99';
      const etaB=(edits[b.id]||{}).eta||b.eta||b.hora||'99:99';
      return etaA.localeCompare(etaB);
    });
  }

  function renderFlights() {
    const flights = getFilteredFlights(), list = document.getElementById('flightList');
    list.innerHTML = ''; renderStats(flights);
    if (!flights.length) { list.innerHTML='<div class="no-data-msg">Sin vuelos para los filtros seleccionados</div>'; return; }
    const nextIdx = flights.findIndex(f => !audited.has(f.id) && f.estado!=='INBLOCK');
    flights.forEach((f,i) => {
      const ef = edits[f.id] || {};
      const stand = ef.stand || f.stand;
      const cinta = ef.cinta || f.cinta;
      const eta = ef.eta || f.eta || f.hora;
      const puerta = ef.puerta || f.puerta || '—';
      // Recalcular remoto si el stand fue editado
      const remoto = ef.stand ? isRemoto(ef.stand) : f.remoto;
      const isAudited = audited.has(f.id), isNext = i===nextIdx && !isAudited;

      const card = document.createElement('div');
      card.className = `flight-card ${isNext?'next-flight':''} ${isAudited?'audited':''} ${remoto?'remoto':''}`;

      // Barra de alerta remoto (solo en modo escalas)
      const remotoBanner = (mode === 'escalas' && remoto)
        ? `<div class="card-top-bar"><span class="remoto-badge">🚌 STAND REMOTO · embarque ${puerta}</span></div>`
        : '';

      const keyLabel = mode==='escalas' ? 'STAND' : 'CINTA';
      const keyValue = mode==='escalas' ? stand : cinta;
      const keyClass = mode==='escalas' ? 'gate-val' : 'cinta-val';

      // En modo escalas: 4 columnas (ETA, STAND, PUERTA, CINTA)
      // En modo equipajes: 3 columnas (ETA, CINTA, STAND) — igual que antes
      let gridHTML = '';
      if (mode === 'escalas') {
        gridHTML = `
          <div class="card-grid card-grid-4">
            <div class="card-field"><div class="field-label">ETA</div><div class="field-value eta editable" onclick="openModal('${f.id}')">${eta||'—'}</div></div>
            <div class="card-field"><div class="field-label">STAND</div><div class="field-value gate-val editable" onclick="openModal('${f.id}')">${stand||'—'}</div></div>
            <div class="card-field"><div class="field-label">PUERTA</div><div class="field-value ${remoto?'puerta-val':''}" style="${!remoto?'color:var(--muted);font-size:13px':'font-size:13px'}">${puerta}</div></div>
            <div class="card-field"><div class="field-label">CINTA</div><div class="field-value" style="color:var(--muted);font-size:13px">${cinta}</div></div>
          </div>`;
      } else {
        gridHTML = `
          <div class="card-grid card-grid-3">
            <div class="card-field"><div class="field-label">ETA</div><div class="field-value eta editable" onclick="openModal('${f.id}')">${eta||'—'}</div></div>
            <div class="card-field"><div class="field-label">CINTA</div><div class="field-value cinta-val editable" onclick="openModal('${f.id}')">${cinta||'—'}</div></div>
            <div class="card-field"><div class="field-label">STAND</div><div class="field-value" style="color:var(--muted);font-size:13px">${stand}</div></div>
          </div>`;
      }

      card.innerHTML = `
        ${remotoBanner}
        <div class="card-top">
          <div class="flight-num">${f.id}</div>
          <div class="origin-tag">${f.origen}</div>
          <span class="chip chip-${f.handler} selected" style="pointer-events:none">${f.handler}</span>
        </div>
        ${gridHTML}
        <div class="card-bottom">
          <span class="status-pill status-${f.estado}">${f.estado}</span>
          <button class="audit-btn ${isAudited?'audit-btn-undo':'audit-btn-do'}" onclick="toggleAudit('${f.id}')">${isAudited?'↩ Deshacer':'✓ Auditado'}</button>
        </div>
        ${mode==='escalas'?`<div class="mat-row"><span class="mat-label">MATR.</span><button class="mat-btn" id="mat-${f.id}" onclick="copyMatricula('${f.id}')">${ef.matricula||f.matricula||'—'}</button><button class="mat-edit" onclick="editMatricula('${f.id}')" title="Editar">✎</button></div>`:''}
      `;
      list.appendChild(card);
    });
  }

  function renderStats(flights) {
    const done=flights.filter(f=>audited.has(f.id)).length, pending=flights.length-done;
    const active=flights.filter(f=>['LANDED','FINAL','FIR','FLYING'].includes(f.estado)).length;
    const remotos=flights.filter(f=>f.remoto && !audited.has(f.id)).length;
    const byH={}; flights.forEach(f=>{if(!byH[f.handler])byH[f.handler]=0;byH[f.handler]++;});
    let html=`
      <div class="stat"><div class="stat-num">${pending}</div><div class="stat-label">Pendientes</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-label">Auditados</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--yellow)">${active}</div><div class="stat-label">En vuelo</div></div>
      ${remotos>0?`<div class="stat"><div class="stat-num" style="color:var(--orange)">${remotos}</div><div class="stat-label">🚌 Remotos</div></div>`:''}`;
    Object.entries(byH).forEach(([h,n])=>{html+=`<div class="stat"><div class="stat-num" style="font-size:14px">${n}</div><div class="stat-label">${h}</div></div>`;});
    document.getElementById('statsBar').innerHTML = html;
  }

  function toggleAudit(id) { if(audited.has(id)) audited.delete(id); else audited.add(id); renderFlights(); }

  function openModal(id) {
    editingId=id; const f=allFlights.find(x=>x.id===id), ef=edits[id]||{};
    document.getElementById('modalTitle').textContent = id+' · '+(f?.origen||'');
    document.getElementById('modalInput').value = ef.stand||f?.stand||'';
    document.getElementById('modalInputCinta').value = ef.cinta||f?.cinta||'';
    document.getElementById('modalInputEta').value = ef.eta||f?.eta||f?.hora||'';
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalInput').focus();
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId=null; }

  function saveEdit() {
    if (!editingId) return;
    edits[editingId] = { stand:document.getElementById('modalInput').value, cinta:document.getElementById('modalInputCinta').value, eta:document.getElementById('modalInputEta').value };
    closeModal(); renderFlights();
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown', e=>{if(e.key==='Enter'&&editingId)saveEdit();if(e.key==='Escape')closeModal();});

  function copyMatricula(id) {
    const ef=edits[id]||{}, f=allFlights.find(x=>x.id===id), mat=ef.matricula||f?.matricula||'';
    if(!mat||mat==='—') return;
    const updateBtn=(ok)=>{ const btn=document.getElementById('mat-'+id); if(btn){btn.classList.add('copied');btn.textContent=ok?'✓ Copiado':'✓';setTimeout(()=>{btn.classList.remove('copied');renderFlights();},1800);}};
    navigator.clipboard.writeText(mat).then(()=>updateBtn(true)).catch(()=>{const ta=document.createElement('textarea');ta.value=mat;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);updateBtn(true);});
  }

  function editMatricula(id) {
    const ef=edits[id]||{}, f=allFlights.find(x=>x.id===id), current=ef.matricula||f?.matricula||'';
    const nueva=prompt('Matrícula para '+id+':',current);
    if(nueva!==null){edits[id]={...(edits[id]||{}),matricula:nueva.toUpperCase().trim()};renderFlights();}
  }

  setInterval(()=>{if(allFlights.length>0)renderFlights();},30000);
</script>
</body>
</html>
